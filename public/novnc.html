<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potorix Embedded Console</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0b1220; color: #d6e2ff; font-family: Inter, system-ui, sans-serif; }
      #bar { padding: 8px 10px; background: #111a2b; border-bottom: 1px solid #23314c; font-size: 12px; display: flex; gap: 10px; align-items: center; }
      #bar .spacer { flex: 1; }
      #bar select { background: #0f1727; color: #d6e2ff; border: 1px solid #2b3b5c; border-radius: 6px; padding: 2px 6px; }
      #screen { width: 100vw; height: calc(100vh - 34px); display: block; image-rendering: pixelated; background: #000; }
    </style>
  </head>
  <body>
    <div id="bar">
      <span>Console: <span id="status">connecting...</span></span>
      <span class="spacer"></span>
      <label for="profile">Profile</label>
      <select id="profile">
        <option value="latency">Low Latency</option>
        <option value="balanced">Balanced</option>
        <option value="quality">High Quality</option>
      </select>
    </div>
    <div id="screen"></div>
    <script type="module">
      import RFB from '/novnc-vendor/core/rfb.js';

      const statusEl = document.getElementById('status');
      const setStatus = (msg) => {
        statusEl.textContent = msg;
        // Helps diagnose noVNC connection flow directly from browser devtools.
        console.log('[potorix-novnc]', msg);
      };

      function parseParams() {
        const q = new URLSearchParams(window.location.search);
        return {
          tenant: q.get('tenant') || '',
          token: q.get('token') || '',
          vmId: q.get('vm_id') || '',
        };
      }

      const params = parseParams();
      const profileEl = document.getElementById('profile');
      let rfb;

      function applyProfile(profile) {
        if (!rfb) return;
        if (profile === 'quality') {
          rfb.scaleViewport = true;
          rfb.resizeSession = true;
          rfb.qualityLevel = 9;
          rfb.compressionLevel = 2;
        } else if (profile === 'balanced') {
          rfb.scaleViewport = true;
          rfb.resizeSession = false;
          rfb.qualityLevel = 6;
          rfb.compressionLevel = 4;
        } else {
          rfb.scaleViewport = false;
          rfb.resizeSession = false;
          rfb.qualityLevel = 4;
          rfb.compressionLevel = 7;
        }
      }

      if (!params.tenant || !params.token || !params.vmId) {
        setStatus('missing tenant/token/vm_id');
      } else {
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/ws/vnc?tenant=${encodeURIComponent(params.tenant)}&token=${encodeURIComponent(params.token)}&vm_id=${encodeURIComponent(params.vmId)}`;
        setStatus(`connecting via ${wsUrl}`);
        try {
          rfb = new RFB(document.getElementById('screen'), wsUrl);
          rfb.viewOnly = false;
          applyProfile('latency');
          profileEl.addEventListener('change', () => applyProfile(profileEl.value));
          rfb.addEventListener('connect', () => { setStatus('connected'); });
          rfb.addEventListener('disconnect', (e) => {
            const clean = !!(e && e.detail && e.detail.clean);
            setStatus(`disconnected (${clean ? 'clean' : 'error'})`);
          });
          rfb.addEventListener('credentialsrequired', () => { setStatus('credentials required'); });
          rfb.addEventListener('securityfailure', (e) => {
            const reason = e && e.detail && e.detail.status ? e.detail.status : 'unknown';
            setStatus(`security failure (${reason})`);
          });
          rfb.addEventListener('serververification', () => { setStatus('server verification requested'); });
        } catch (err) {
          setStatus(`rfb init failed: ${err?.message || err}`);
        }
      }
    </script>
  </body>
</html>

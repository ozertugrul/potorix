<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potorix Embedded Console</title>
    <style>
      html, body { margin: 0; width: 100%; height: 100%; background: #0b1220; color: #d6e2ff; font-family: Inter, system-ui, sans-serif; overflow: hidden; }
      body { display: flex; flex-direction: column; }
      #bar { padding: 8px 10px; background: #111a2b; border-bottom: 1px solid #23314c; font-size: 12px; flex: 0 0 auto; }
      #screen { width: 100%; flex: 1 1 auto; min-height: 0; display: flex; align-items: stretch; justify-content: stretch; image-rendering: pixelated; background: #000; overflow: hidden; }
      #screen > * { width: 100% !important; height: 100% !important; }
      #screen canvas,
      #screen .noVNC_canvas {
        width: 100% !important;
        height: 100% !important;
      }
      body.embed-fullscreen #bar { display: none; }
      body.embed-fullscreen #screen { width: 100vw; height: 100vh; flex: 0 0 auto; }
      body.embed-fullscreen #screen canvas,
      body.embed-fullscreen #screen .noVNC_canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="bar">Console: <span id="status">connecting...</span></div>
    <div id="screen"></div>
    <script type="module">
      import RFB from '/novnc-vendor/core/rfb.js';

      const statusEl = document.getElementById('status');
      let rfb = null;
      let resizeTimer = null;

      const setStatus = (msg) => {
        statusEl.textContent = msg;
        // Helps diagnose noVNC connection flow directly from browser devtools.
        console.log('[potorix-novnc]', msg);
      };

      function isEmbeddedFullscreen() {
        try {
          const parentDoc = window.parent && window.parent.document;
          const frameEl = window.frameElement;
          if (!parentDoc || !frameEl) return false;
          const fsEl = parentDoc.fullscreenElement || parentDoc.webkitFullscreenElement;
          return !!(fsEl && fsEl.contains(frameEl));
        } catch (_err) {
          return false;
        }
      }

      function applyEmbedLayout() {
        document.body.classList.toggle('embed-fullscreen', isEmbeddedFullscreen());
      }

      function syncRfbScale() {
        applyEmbedLayout();
        const screen = document.getElementById('screen');
        if (screen) {
          screen.querySelectorAll('*').forEach((node) => {
            if (!(node instanceof HTMLElement)) return;
            node.style.width = '100%';
            node.style.height = '100%';
          });
        }
        if (!rfb) return;
        // Re-apply scaling flags after size transitions (fullscreen/orientation/resize).
        rfb.scaleViewport = false;
        rfb.scaleViewport = true;
        rfb.resizeSession = false;
        rfb.resizeSession = true;
      }

      function scheduleSync() {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          resizeTimer = null;
          syncRfbScale();
        }, 60);
      }

      function parseParams() {
        const q = new URLSearchParams(window.location.search);
        return {
          tenant: q.get('tenant') || '',
          token: q.get('token') || '',
          vmId: q.get('vm_id') || '',
        };
      }

      const params = parseParams();
      applyEmbedLayout();
      window.addEventListener('resize', scheduleSync);
      window.addEventListener('message', (event) => {
        if (event.origin !== window.location.origin) return;
        if (!event.data || event.data.type !== 'potorix.console.layout') return;
        scheduleSync();
      });

      if (!params.tenant || !params.token || !params.vmId) {
        setStatus('missing tenant/token/vm_id');
      } else {
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${protocol}://${window.location.host}/ws/vnc?tenant=${encodeURIComponent(params.tenant)}&token=${encodeURIComponent(params.token)}&vm_id=${encodeURIComponent(params.vmId)}`;
        setStatus(`connecting via ${wsUrl}`);
        try {
          rfb = new RFB(document.getElementById('screen'), wsUrl);
          rfb.scaleViewport = true;
          rfb.resizeSession = true;
          rfb.viewOnly = false;
          rfb.addEventListener('connect', () => {
            setStatus('connected');
            scheduleSync();
          });
          rfb.addEventListener('disconnect', (e) => {
            const clean = !!(e && e.detail && e.detail.clean);
            setStatus(`disconnected (${clean ? 'clean' : 'error'})`);
          });
          rfb.addEventListener('credentialsrequired', () => { setStatus('credentials required'); });
          rfb.addEventListener('securityfailure', (e) => {
            const reason = e && e.detail && e.detail.status ? e.detail.status : 'unknown';
            setStatus(`security failure (${reason})`);
          });
          rfb.addEventListener('serververification', () => { setStatus('server verification requested'); });
          scheduleSync();
        } catch (err) {
          setStatus(`rfb init failed: ${err?.message || err}`);
        }
      }
    </script>
  </body>
</html>
